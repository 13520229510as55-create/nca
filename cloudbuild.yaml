# Cloud Build 配置 - NCA Toolkit 中文字体版
# 在 GCP 云端构建 Docker 镜像并部署到 Cloud Run
# 无需本地安装 Docker

steps:
  # 1. 构建 Docker 镜像
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/nca-toolkit-chinese:${BUILD_ID}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/nca-toolkit-chinese:latest'
      - '.'

  # 2. 推送镜像到 GCR
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/nca-toolkit-chinese:latest'

  # 3. 部署到 Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nca-toolkit-chinese'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/nca-toolkit-chinese:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '600'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--update-env-vars'
      - 'API_KEY=123,GCP_BUCKET_NAME=${_BUCKET_NAME},MAX_QUEUE_LENGTH=10,GUNICORN_WORKERS=4,GUNICORN_TIMEOUT=300'

# 构建超时 2 小时（FFmpeg 等编译较慢）
timeout: '7200s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - 'gcr.io/${PROJECT_ID}/nca-toolkit-chinese:${BUILD_ID}'
  - 'gcr.io/${PROJECT_ID}/nca-toolkit-chinese:latest'
